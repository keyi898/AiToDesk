name: Build AiToDesk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build target'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - mac
          - linux

jobs:
  build-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        run: npm run build-frontend

      - name: Verify frontend dist
        run: |
          if (-not (Test-Path "public/dist/index.html")) {
            Write-Error "public/dist/index.html not found! Frontend build failed."
            exit 1
          }
          Write-Host "✅ Frontend built successfully: public/dist/index.html"

      - name: Rebuild native modules
        run: npm run re-sqlite

      - name: Package Windows installer
        run: npm run build-w

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AiToDesk-Windows-x64
          path: |
            *.exe
            win-unpacked/**

  build-mac:
    if: ${{ github.event.inputs.platform == 'mac' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd frontend && npm install && cd ..
      - run: npm run build-frontend
      - run: npm run build-m

  build-linux:
    if: ${{ github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd frontend && npm install && cd ..
      - run: npm run build-frontend
      - run: npm run build-l
