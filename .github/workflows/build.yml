name: Build AiToDesk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build target'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - mac
          - linux

jobs:
  build-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        run: npm run build-frontend

      - name: Verify frontend dist
        run: |
          if (-not (Test-Path "public/dist/index.html")) {
            Write-Error "public/dist/index.html not found! Frontend build failed."
            exit 1
          }
          Write-Host "✅ Frontend built successfully: public/dist/index.html"

      - name: Rebuild native modules
        run: npm run re-sqlite

      - name: Download OllamaSetup.exe (bundle)
        shell: pwsh
        run: |
          $dir = "build\extraResources\ollama"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $url = "https://github.com/ollama/ollama/releases/latest/download/OllamaSetup.exe"
          $out = "$dir\OllamaSetup.exe"
          if (-not (Test-Path $out)) {
            Write-Host "⬇️  Downloading OllamaSetup.exe from $url"
            Invoke-WebRequest -Uri $url -OutFile $out -UserAgent "AiToDesk-Build"
            $size = (Get-Item $out).Length
            Write-Host "✅ Downloaded: $([math]::Round($size/1MB, 1)) MB"
          } else {
            Write-Host "⏭️  OllamaSetup.exe already exists, skipping download"
          }

      - name: Package Windows installer
        run: npm run build-w

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AiToDesk-Windows-x64
          path: ./*.exe

  build-mac:
    if: ${{ github.event.inputs.platform == 'mac' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd frontend && npm install && cd ..
      - run: npm run build-frontend
      - name: Download Ollama-darwin.zip (bundle)
        shell: bash
        run: |
          mkdir -p build/extraResources/ollama
          if [ ! -f build/extraResources/ollama/Ollama-darwin.zip ]; then
            echo "⬇️  Downloading Ollama-darwin.zip..."
            curl -L -o build/extraResources/ollama/Ollama-darwin.zip \
              "https://github.com/ollama/ollama/releases/latest/download/Ollama-darwin.zip"
            echo "✅ Downloaded"
          else
            echo "⏭️  Already exists"
          fi
      - run: npm run build-m

  build-linux:
    if: ${{ github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: cd frontend && npm install && cd ..
      - run: npm run build-frontend
      - name: Download ollama-linux-amd64.tgz (bundle)
        shell: bash
        run: |
          mkdir -p build/extraResources/ollama
          if [ ! -f build/extraResources/ollama/ollama-linux-amd64.tgz ]; then
            echo "⬇️  Downloading ollama-linux-amd64.tgz..."
            curl -L -o build/extraResources/ollama/ollama-linux-amd64.tgz \
              "https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tgz"
            echo "✅ Downloaded"
          else
            echo "⏭️  Already exists"
          fi
      - run: npm run build-l
