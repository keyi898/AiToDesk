name: Build aitdesk Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    - name: Install frontend deps
      run: |
        cd frontend
        npm install --no-package-lock
        cd ..

    - name: Install root deps
      run: npm install --no-package-lock

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Debug frontend build
      run: |
        Write-Host "=== frontend/dist BEFORE build ==="
        if (Test-Path frontend/dist) { Get-ChildItem -Recurse frontend/dist | Select-Object FullName } else { Write-Host "frontend/dist does not exist" }
        Write-Host "=== public/dist BEFORE build ==="
        if (Test-Path public/dist) { Get-ChildItem -Recurse public/dist | Select-Object FullName } else { Write-Host "public/dist does not exist" }

    - name: Build Windows
      run: |
        npm run build-w 2>&1 | Tee-Object -FilePath build.log

    - name: Debug after build
      run: |
        Write-Host "=== frontend/dist AFTER build ==="
        if (Test-Path frontend/dist) { Get-ChildItem -Recurse frontend/dist | Select-Object FullName } else { Write-Host "frontend/dist does not exist" }
        Write-Host "=== public/dist AFTER build ==="
        if (Test-Path public/dist) { Get-ChildItem -Recurse public/dist | Select-Object FullName } else { Write-Host "public/dist does not exist" }
        Write-Host "=== build.log tail ==="
        Get-Content build.log | Select-Object -Last 30

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aitdesk-Windows
        path: |
          public/dist/**
          build/**
          out/**
          *.exe
        compression-level: 0
