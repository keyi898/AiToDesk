name: Build aitodesk Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend deps
      run: |
        cd frontend
        npm install --no-package-lock
        cd ..

    - name: Install root deps
      run: npm install --no-package-lock

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Windows
      run: npm run build-w
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aitodesk-Windows
        path: |
          public/dist/**
          build/**
          out/**
          *.exe
        compression-level: 0
